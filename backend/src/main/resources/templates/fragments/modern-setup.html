<!-- fragments/modern-setup.html -->
<th:block th:fragment="tailwind-config">
    <!-- Google Fonts: Inter & Geist Sans (System UI fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration for High-Fidelity Linear/Modern -->
    <script>
        tailwind.config = {
            darkMode: 'class', // Force dark mode patterns if needed
            theme: {
                extend: {
                    colors: {
                        background: {
                            deep: '#020203',
                            base: '#050506',
                            elevated: '#0a0a0c',
                        },
                        surface: {
                            DEFAULT: 'rgba(255, 255, 255, 0.05)',
                            hover: 'rgba(255, 255, 255, 0.08)',
                        },
                        foreground: {
                            DEFAULT: '#EDEDEF',
                            muted: '#8A8F98',
                            subtle: 'rgba(255, 255, 255, 0.60)',
                        },
                        accent: {
                            DEFAULT: '#5E6AD2',
                            bright: '#6872D9',
                            glow: 'rgba(94, 106, 210, 0.3)',
                        },
                        border: {
                            default: 'rgba(255, 255, 255, 0.06)',
                            hover: 'rgba(255, 255, 255, 0.10)',
                            accent: 'rgba(94, 106, 210, 0.30)',
                        }
                    },
                    boxShadow: {
                        'modern-card': '0 0 0 1px rgba(255,255,255,0.06), 0 2px 20px rgba(0,0,0,0.4), 0 0 40px rgba(0,0,0,0.2)',
                        'modern-card-hover': '0 0 0 1px rgba(255,255,255,0.1), 0 8px 40px rgba(0,0,0,0.5), 0 0 80px rgba(94,106,210,0.1)',
                        'modern-button': '0 0 0 1px rgba(94,106,210,0.5), 0 4px 12px rgba(94,106,210,0.3), inset 0 1px 0 0 rgba(255,255,255,0.2)',
                        'modern-inner': 'inset 0 1px 0 0 rgba(255,255,255,0.05)',
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'system-ui', 'sans-serif'],
                        heading: ['"Inter"', 'system-ui', 'sans-serif'] // Using Inter for both as Geist is harder to load via basic Google Fonts API, Inter works beautifully.
                    },
                    animation: {
                        'blob-float': 'blob-float 10s ease-in-out infinite',
                        'blob-float-alt': 'blob-float-alt 12s ease-in-out infinite',
                        'blob-pulse': 'blob-pulse 8s ease-in-out infinite',
                    },
                    keyframes: {
                        'blob-float': {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(2deg)' },
                        },
                        'blob-float-alt': {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(15px) rotate(-2deg)' },
                        },
                        'blob-pulse': {
                            '0%, 100%': { opacity: '0.1', transform: 'scale(1)' },
                            '50%': { opacity: '0.15', transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-base text-foreground font-sans antialiased overflow-x-hidden min-h-screen relative z-0;
                /* Base radial gradient layer */
                background-image: radial-gradient(ellipse at top, #0a0a0f 0%, #050506 50%, #020203 100%);
            }
            h1, h2, h3, h4, h5, h6 {
                @apply font-heading tracking-tight;
            }
        }
        
        @layer components {
            .modern-card {
                @apply relative overflow-hidden rounded-2xl bg-gradient-to-b from-white/[0.04] to-transparent border border-white/[0.04] p-6 lg:p-8 text-foreground backdrop-blur-md transition-all duration-[300ms] ease-out;
                box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05), 0 0 0 1px rgba(255,255,255,0.03), 0 2px 20px rgba(0,0,0,0.4);
            }
            .modern-card:hover {
                @apply border-white/[0.08] -translate-y-1;
                /* Added top highlight and soft indigo ambient shadow on hover */
                box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.1), 0 0 0 1px rgba(255,255,255,0.08), 0 8px 30px rgba(0,0,0,0.6), 0 0 60px rgba(94,106,210,0.08);
            }
            
            .modern-btn {
                @apply inline-flex items-center justify-center font-medium tracking-wide transition-all duration-[250ms] ease-out rounded-lg h-10 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-accent/50 focus:ring-offset-2 focus:ring-offset-background-base;
            }
            .modern-btn-primary {
                @apply bg-accent text-white shadow-modern-button hover:bg-accent-bright active:scale-[0.98] active:shadow-none;
            }
            .modern-btn-secondary {
                @apply bg-surface text-foreground shadow-modern-inner hover:bg-surface-hover hover:shadow-[0_0_15px_rgba(255,255,255,0.05),inset_0_1px_0_0_rgba(255,255,255,0.1)] active:scale-[0.98] border border-white/[0.06];
            }
            .modern-btn-ghost {
                @apply bg-transparent text-foreground-muted hover:bg-white/[0.05] hover:text-foreground active:scale-[0.98];
            }
            
            .modern-input {
                @apply flex w-full border border-white/10 bg-[#0F0F12] px-4 py-2.5 text-foreground text-sm rounded-lg focus:border-accent focus:ring-1 focus:ring-accent/50 transition-all duration-200 placeholder:text-foreground-subtle focus-visible:outline-none shadow-inner;
            }
            
            .modern-text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-b from-white via-white/90 to-white/60;
            }
            .modern-text-gradient-accent {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-[#5E6AD2] via-indigo-400 to-[#5E6AD2];
                background-size: 200% auto;
            }
            
            .modern-badge {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border;
            }
            .modern-badge-accent {
                @apply bg-accent/10 text-accent-bright border-accent/20;
            }
            .modern-badge-muted {
                @apply bg-white/5 text-foreground-muted border-white/10;
            }
            .modern-badge-success {
                @apply bg-emerald-500/10 text-emerald-400 border-emerald-500/20;
            }
            .modern-badge-warning {
                @apply bg-amber-500/10 text-amber-400 border-amber-500/20;
            }
            .modern-badge-danger {
                @apply bg-rose-500/10 text-rose-400 border-rose-500/20;
            }
        }
        
        /* Utility for ambient background layers */
        .ambient-noise {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
    
    <!-- Script to add mouse tracking logic across elements with 'spotlight-effect' class -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.modern-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
            });
            // We can add the spotlight via a CSS pseudo-element that references --mouse-x and --mouse-y if desired:
            // .modern-card::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle 300px at var(--mouse-x, 0) var(--mouse-y, 0), rgba(94, 106, 210, 0.08), transparent 40%); opacity: 0; transition: opacity 0.3s; z-index: -1; pointer-events: none; }
            // .modern-card:hover::before { opacity: 1; }
        });
    </script>
    <style>
        .modern-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle 400px at var(--mouse-x, 0) var(--mouse-y, 0), rgba(94, 106, 210, 0.12), transparent 40%);
            opacity: 0;
            transition: opacity 0.4s ease-out;
            z-index: 0;
            pointer-events: none;
        }
        .modern-card:hover::before {
            opacity: 1;
        }
        .modern-card > * {
            position: relative;
            z-index: 1;
        }
    </style>
</th:block>
