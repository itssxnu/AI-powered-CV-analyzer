<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates - AI Recruitment</title>
    <div th:replace="~{fragments/modern-setup :: tailwind-config}"></div>
</head>
<body class="pb-20">

    <!-- Ambient Blobs Background -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden -z-10">
        <div class="ambient-noise"></div>
        <div class="absolute w-[900px] h-[1400px] rounded-[100%] blur-[150px] bg-accent/15 top-[10%] left-[-10%] animate-blob-float mix-blend-screen"></div>
        <div class="absolute w-[800px] h-[800px] rounded-[100%] blur-[150px] bg-indigo-600/10 bottom-[-20%] right-[10%] animate-blob-float-alt mix-blend-screen"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCI+PHBhdGggZD0iTTY0IDBMMCAwaDB2NjRoNjRWMHptLTYzIDYzaC0xdjYzaDF2LTYzeiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwgMjU1LCAyNTUsIDAuMDIpIiBzdHJva2Utd2lkdGg9IjEiLz48L3N2Zz4=')] opacity-50"></div>
    </div>

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-8 py-10 lg:py-16 relative z-10 space-y-12">
        
        <!-- Header & Search Section -->
        <div class="flex flex-col gap-8">
            <div>
                <h1 class="text-4xl sm:text-5xl font-semibold tracking-tight modern-text-gradient mb-2">Candidates</h1>
                <p class="text-lg text-foreground-muted">Browse, filter, and review applicant profiles.</p>
            </div>

            <!-- Search and Filters Box -->
            <div class="modern-card">
                <form method="get" class="flex flex-col md:flex-row gap-6 items-end">
                    <div class="w-full md:flex-1">
                        <label class="block text-xs font-semibold text-foreground-muted uppercase tracking-wide mb-2 ml-1">Search Applicants</label>
                        <div class="relative">
                            <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 text-foreground-subtle text-sm"></i>
                            <input type="text" name="search" th:value="${search}" placeholder="Name, email, or skills..." class="modern-input pl-10">
                        </div>
                    </div>
                    
                    <div class="w-full md:w-64">
                        <label class="block text-xs font-semibold text-foreground-muted uppercase tracking-wide mb-2 ml-1">AI Status</label>
                        <div class="relative">
                            <select name="mlProcessed" onchange="this.form.submit()" class="modern-input appearance-none px-4 cursor-pointer">
                                <option value="">All Statuses</option>
                                <option value="true" th:selected="${mlProcessed == true}">AI Processed</option>
                                <option value="false" th:selected="${mlProcessed == false}">Pending Review</option>
                            </select>
                            <i class="bi bi-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-foreground-subtle pointer-events-none text-xs"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="modern-btn modern-btn-primary w-full md:w-auto h-[42px]">
                        Filter Results
                    </button>
                </form>
            </div>
        </div>

        <!-- Candidate Grid list (Replacing Table) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
             <div th:each="candidate : ${candidates}" class="modern-card p-0 flex flex-col group h-full">
                 
                 <div class="p-6 flex-1 flex flex-col relative z-20">
                     <!-- Top Info -->
                     <div class="flex items-start justify-between mb-6">
                         <div class="flex items-center gap-4">
                             <div class="w-12 h-12 rounded-xl bg-surface border border-white/10 text-foreground-subtle flex items-center justify-center text-xl font-semibold shadow-inner group-hover:text-accent-bright transition-colors">
                                 <span th:text="${#strings.substring(candidate.fullName,0,1)}">J</span>
                             </div>
                             <div>
                                 <h3 class="text-lg font-medium text-foreground line-clamp-1 group-hover:text-white transition-colors" th:text="${candidate.fullName}">John Doe</h3>
                                 <span class="text-xs text-foreground-subtle" th:text="${candidate.email}">email@example.com</span>
                             </div>
                         </div>
                         
                         <!-- Status Dot -->
                         <div class="relative w-2 h-2 rounded-full"
                              th:classappend="${candidate.active} ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)]' : 'bg-rose-400 shadow-[0_0_8px_rgba(244,63,94,0.5)]'"
                              th:title="${candidate.active ? 'Active Account' : 'Inactive Account'}">
                         </div>
                     </div>

                     <!-- Details List -->
                     <div class="space-y-4 mb-8 flex-1">
                         <div class="flex items-center gap-3 text-sm text-foreground-muted">
                             <div class="w-6 h-6 rounded-md bg-white/[0.04] flex items-center justify-center text-foreground-subtle border border-white/[0.04]">
                                <i class="bi bi-briefcase"></i>
                             </div>
                             <span th:text="${candidate.experienceYears != null ? candidate.experienceYears + ' Years' : 'Experience N/A'}"></span>
                         </div>
                         <div class="flex items-start gap-3 text-sm text-foreground-muted">
                             <div class="w-6 h-6 rounded-md bg-white/[0.04] flex items-center justify-center text-foreground-subtle border border-white/[0.04] flex-shrink-0 mt-0.5">
                                <i class="bi bi-tools text-xs"></i>
                             </div>
                             <span class="line-clamp-2 leading-relaxed" th:if="${candidate.skills}" th:text="${candidate.skills}">Skills</span>
                             <span th:unless="${candidate.skills}">No skills specified</span>
                         </div>
                     </div>

                     <!-- Absolute Footer specific to the Card -->
                     <div class="pt-5 border-t border-border-default flex items-center justify-between gap-4 mt-auto">
                          <!-- AI Processed Badge -->
                          <div th:if="${candidate.mlProcessed}" class="modern-badge modern-badge-success flex gap-2 py-1 px-3">
                              <i class="bi bi-robot"></i> Analyzed
                          </div>
                          <!-- Pending Badge -->
                          <div th:unless="${candidate.mlProcessed}" class="modern-badge modern-badge-warning flex gap-2 py-1 px-3">
                              <i class="bi bi-hourglass-split text-xs"></i> Pending
                          </div>

                         <!-- Actions -->
                         <div class="flex items-center gap-2">
                             <a th:href="@{/skill-match/candidate/{id}(id=${candidate.id})}" title="View Matches" class="w-9 h-9 rounded-lg bg-surface border border-white/[0.06] text-foreground-subtle hover:text-white hover:bg-white/[0.08] flex items-center justify-center transition-all group-hover:border-white/10">
                                 <i class="bi bi-graph-up"></i>
                             </a>
                             <a th:href="@{/hr/candidates/{id}(id=${candidate.id})}" title="View Full Profile" class="w-9 h-9 rounded-lg bg-surface border border-white/[0.06] text-accent hover:text-accent-bright hover:bg-accent/10 flex items-center justify-center transition-all group-hover:border-accent/30">
                                 <i class="bi bi-person"></i>
                             </a>
                         </div>
                     </div>
                 </div>
             </div>

             <!-- Empty State -->
             <div th:if="${candidates == null or candidates.isEmpty()}" class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20 flex flex-col items-center justify-center">
                <div class="text-4xl text-foreground-subtle mb-4">
                    <i class="bi bi-search"></i>
                </div>
                <h3 class="text-xl font-medium text-foreground mb-2">No Candidates Found</h3>
                <p class="text-foreground-muted text-sm max-w-sm">We couldn't find any candidates matching your criteria. Try adjusting your search filters.</p>
             </div>
        </div>
    </main>

</body>
</html>
