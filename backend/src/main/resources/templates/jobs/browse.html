<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs - AI Recruitment System</title>
    <div th:replace="~{fragments/modern-setup :: tailwind-config}"></div>
</head>
<body class="bg-background-base text-foreground font-sans min-h-screen relative overflow-x-hidden p-0 m-0 pb-20">

    <!-- Ambient Blobs -->
    
    <!-- Ambient Blobs Background -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden -z-10">
        <div class="ambient-noise"></div>
        <div class="absolute w-[900px] h-[1400px] rounded-[100%] blur-[150px] bg-accent/15 top-[10%] left-[-10%] animate-blob-float mix-blend-screen"></div>
        <div class="absolute w-[800px] h-[800px] rounded-[100%] blur-[150px] bg-indigo-600/10 bottom-[-20%] right-[10%] animate-blob-float-alt mix-blend-screen"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCI+PHBhdGggZD0iTTY0IDBMMCAwaDB2NjRoNjRWMHptLTYzIDYzaC0xdjYzaDF2LTYzeiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwgMjU1LCAyNTUsIDAuMDIpIiBzdHJva2Utd2lkdGg9IjEiLz48L3N2Zz4=')] opacity-50"></div>
    </div>


    <div th:replace="~{fragments/header :: header}"></div>

    <div class="max-w-[1400px] mx-auto px-4 sm:px-8 py-10 lg:py-16 relative z-10">
        
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-10">
            <div>
                <h1 class="text-4xl sm:text-5xl font-black font-heading tracking-tight mb-2">Job Market</h1>
                <p class="text-foreground-muted font-bold tracking-wide">Showing <span th:text="${jobs.size()}" class="text-accent">0</span> active opportunities.</p>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Sidebar Navigation & Filters -->
            <div class="w-full lg:w-80 shrink-0 space-y-6 sticky top-8 h-max">
                
                <div class="modern-card p-6 bg-surface border border-white/[0.06]">
                    <h5 class="text-lg font-black flex items-center gap-3 border-b border-white/[0.08] pb-4 mb-6">
                        <i class="bi bi-funnel-fill text-accent"></i> Filters
                    </h5>
                    
                    <form method="get" action="/jobs/browse" class="space-y-6">
                        
                        <div>
                            <label class="block text-xs font-bold text-foreground-muted tracking-widest uppercase mb-2 ml-2">Text Search</label>
                            <div class="relative">
                                <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 text-foreground-muted font-bold"></i>
                                <input type="text" name="search" th:value="${search}" placeholder="Keyword, skill, role..." class="modern-input shadow-inner w-full pl-10">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-foreground-muted tracking-widest uppercase mb-2 ml-2">Department</label>
                            <select name="department" class="modern-input shadow-inner w-full appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M7%2010L12%2015L17%2010%22%20stroke%3D%22%2394A3B8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E')] bg-[length:24px] bg-[right:12px_center] bg-no-repeat" onchange="this.form.submit()">
                                <option value="">All Departments</option>
                                <option value="Engineering" th:selected="${department == 'Engineering'}">Engineering</option>
                                <option value="Sales" th:selected="${department == 'Sales'}">Sales</option>
                                <option value="Marketing" th:selected="${department == 'Marketing'}">Marketing</option>
                                <option value="HR" th:selected="${department == 'HR'}">Human Resources</option>
                                <option value="Finance" th:selected="${department == 'Finance'}">Finance</option>
                                <option value="Operations" th:selected="${department == 'Operations'}">Operations</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-foreground-muted tracking-widest uppercase mb-2 ml-2">Job Type</label>
                            <select name="jobType" class="modern-input shadow-inner w-full appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M7%2010L12%2015L17%2010%22%20stroke%3D%22%2394A3B8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E')] bg-[length:24px] bg-[right:12px_center] bg-no-repeat" onchange="this.form.submit()">
                                <option value="">Any Type</option>
                                <option th:each="type : ${jobTypes}"
                                        th:value="${type.name()}"
                                        th:text="${type.displayName}"
                                        th:selected="${jobType != null and jobType.name() == type.name()}">
                                </option>
                            </select>
                        </div>

                        <div class="pt-4 flex gap-3 flex-col xl:flex-row">
                            <button type="submit" class="modern-btn modern-btn-primary flex-1 justify-center py-2.5">Apply</button>
                            <a href="/jobs/browse" class="flex-1 py-2.5 rounded-xl border-2 border-white/[0.08] text-foreground-subtle font-bold hover:bg-surface transition-colors text-center text-sm flex items-center justify-center">Reset</a>
                        </div>
                    </form>
                </div>

                <!-- Platform Stats -->
                <div class="modern-card p-6 bg-gradient-to-br from-indigo-500 to-clay-accent text-white overflow-hidden relative">
                    <i class="bi bi-graph-up absolute -right-4 -bottom-4 text-7xl opacity-20"></i>
                    <h5 class="text-sm font-black uppercase tracking-widest mb-6 opacity-90"><i class="bi bi-bar-chart-fill"></i> Platform Stats</h5>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl border border-white/20 backdrop-blur-sm">
                            <span class="font-bold text-sm">Active Jobs</span>
                            <span class="font-black text-2xl" th:text="${stats.activeJobs}">0</span>
                        </div>
                        <div class="flex justify-between items-center bg-emerald-500/20 p-4 rounded-2xl border border-emerald-400/30 backdrop-blur-sm">
                            <span class="font-bold text-sm">Total Applications</span>
                            <span class="font-black text-2xl text-emerald-100" th:text="${stats.totalApplications}">0</span>
                        </div>
                    </div>
                </div>

            </div>
            
            <!-- Job Grid -->
            <div class="flex-1">
                
                <div th:if="${jobs.isEmpty()}" class="bg-surface rounded-[32px] border-2 border-dashed border-border-default/20 p-16 text-center shadow-sm">
                    <i class="bi bi-search text-6xl text-foreground-muted/30 mb-4 block"></i>
                    <h3 class="text-2xl font-black mb-2">No Matching Jobs</h3>
                    <p class="text-foreground-muted font-medium mb-6">We couldn't find any jobs matching your criteria. Try widening your search.</p>
                    <a href="/jobs/browse" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-white/[0.08] text-foreground-muted font-bold shadow-sm hover:bg-white/[0.1] transition-colors">
                        <i class="bi bi-arrow-counterclockwise"></i> Reset Filters
                    </a>
                </div>

                <div th:unless="${jobs.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Listing Box -->
                    <div th:each="job : ${jobs}" class="modern-card flex flex-col p-6 hover:-translate-y-1 hover:shadow-clayDeep transition-all duration-300 relative overflow-hidden group border-2 border-transparent hover:border-indigo-500/30 bg-surface">
                        
                        <!-- Status Strip -->
                        <div th:if="${job.isActive() and !job.isExpired()}" class="absolute top-0 left-0 w-full h-1.5 bg-emerald-400"></div>
                        <div th:unless="${job.isActive() or job.isExpired()}" class="absolute top-0 left-0 w-full h-1.5 bg-white/10"></div>

                        <div class="flex justify-between items-start mb-4">
                            <!-- Icon / ID Badge -->
                            <div class="w-12 h-12 rounded-2xl bg-accent/10 text-accent flex items-center justify-center text-xl shadow-inner border border-indigo-500/30">
                                <i class="bi bi-briefcase-fill"></i>
                            </div>
                            <!-- Live badge -->
                            <span th:if="${job.isActive() and !job.isExpired()}" class="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-sm">
                                <i class="bi bi-record-circle-fill animate-pulse"></i> Live
                            </span>
                            <span th:unless="${job.isActive() or job.isExpired()}" class="inline-flex items-center gap-1.5 px-3 py-1 bg-surface text-foreground-subtle rounded-lg text-[10px] font-bold uppercase tracking-widest shadow-sm">
                                <i class="bi bi-lock-fill"></i> Closed
                            </span>
                        </div>

                        <!-- Title -->
                        <h4 class="font-black text-xl mb-1 line-clamp-2 min-h-[56px]">
                            <a th:href="@{/jobs/view/{id}(id=${job.id})}" class="text-foreground hover:text-accent transition-colors" th:text="${job.title}">Job Title</a>
                        </h4>

                        <!-- Meta Data -->
                        <div class="flex flex-wrap gap-x-4 gap-y-2 mb-4 text-xs font-bold text-foreground-muted mt-2 border-b border-white/[0.04] pb-4">
                            <span class="flex items-center gap-1.5"><i class="bi bi-grid-1x2-fill"></i> <span th:text="${job.department}"></span></span>
                            <span class="flex items-center gap-1.5"><i class="bi bi-geo-alt-fill"></i> <span th:text="${job.location}"></span></span>
                            <span class="flex items-center gap-1.5"><i class="bi bi-stopwatch-fill"></i> <span th:text="${job.jobType.displayName}"></span></span>
                        </div>

                        <div class="flex-1 mb-4">
                            <p class="text-foreground-subtle text-sm font-medium line-clamp-3 leading-relaxed" th:text="${#strings.abbreviate(job.description, 180)}">Description...</p>
                        </div>

                        <!-- Skills Tags -->
                        <div class="mb-6 flex flex-wrap gap-2">
                            <span th:each="skill, iterStat : ${#strings.listSplit(job.requiredSkills, ',')}" 
                                  th:if="${job.requiredSkills != null and !job.requiredSkills.isEmpty() and iterStat.index < 3}" 
                                  class="px-2.5 py-1 bg-white/[0.02] border border-white/[0.08] rounded-md text-[10px] font-bold text-foreground-muted shadow-sm"
                                  th:text="${skill.trim()}"></span>
                            <span th:if="${job.requiredSkills != null and #strings.listSplit(job.requiredSkills, ',').size() > 3}"
                                  class="px-2.5 py-1 bg-surface border border-white/[0.08] rounded-md text-[10px] font-bold text-foreground-subtle shadow-sm">
                                +<span th:text="${#strings.listSplit(job.requiredSkills, ',').size() - 3}"></span>
                            </span>
                        </div>

                        <!-- Footer -->
                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-white/[0.04] bg-white/[0.02]/50 -mx-6 -mb-6 px-6 pb-6 pt-5">
                            <div>
                                <p class="text-[10px] font-bold text-foreground-muted uppercase tracking-widest mb-1">Salary Range</p>
                                <p class="text-emerald-400 font-bold text-sm bg-emerald-500/10 px-2 py-1 rounded inline-block border border-emerald-500/30" th:text="${job.getSalaryRange()}">$70k</p>
                            </div>
                            <div class="text-right">
                                <a th:href="@{/jobs/view/{id}(id=${job.id})}" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-surface text-accent border border-indigo-500/30 font-bold rounded-xl shadow-sm hover:border-indigo-400 transition-all text-sm group-hover:bg-indigo-600 group-hover:text-white group-hover:border-transparent group-hover:shadow-modern-buttonHover">
                                    View Job  <i class="bi bi-arrow-right-short text-lg leading-none"></i>
                                </a>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
