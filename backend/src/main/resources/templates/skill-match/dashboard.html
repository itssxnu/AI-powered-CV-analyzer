<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Dashboard - Skill Core</title>
    <div th:replace="~{fragments/modern-setup :: tailwind-config}"></div>
</head>
<body class="bg-background-base text-foreground font-sans min-h-screen relative overflow-x-hidden p-0 m-0 pb-20">

    
    <!-- Ambient Blobs Background -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden -z-10">
        <div class="ambient-noise"></div>
        <div class="absolute w-[900px] h-[1400px] rounded-[100%] blur-[150px] bg-accent/15 top-[10%] left-[-10%] animate-blob-float mix-blend-screen"></div>
        <div class="absolute w-[800px] h-[800px] rounded-[100%] blur-[150px] bg-indigo-600/10 bottom-[-20%] right-[10%] animate-blob-float-alt mix-blend-screen"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCI+PHBhdGggZD0iTTY0IDBMMCAwaDB2NjRoNjRWMHptLTYzIDYzaC0xdjYzaDF2LTYzeiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwgMjU1LCAyNTUsIDAuMDIpIiBzdHJva2Utd2lkdGg9IjEiLz48L3N2Zz4=')] opacity-50"></div>
    </div>


    <div th:replace="~{fragments/header :: header}"></div>

    <main class="max-w-[1400px] mx-auto px-4 sm:px-8 py-10 lg:py-16 relative z-10 space-y-8">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
            <div>
                <h1 class="text-3xl sm:text-4xl font-black font-heading tracking-tight mb-2 flex items-center gap-3 drop-shadow-sm">
                    <i class="bi bi-cpu-fill text-accent-bright"></i> Skill Match ML Core
                </h1>
                <p class="text-foreground-muted font-bold tracking-wide uppercase text-sm">
                    Entity Feature Extraction Vector Database
                </p>
            </div>
        </div>

        <!-- Node Activity Array -->
        <div class="modern-card p-0 overflow-hidden border-2 border-white/[0.04]">
            <div class="p-6 bg-white/[0.04] border-b border-white/[0.08] flex justify-between items-center backdrop-blur-sm">
                <h5 class="font-black text-foreground flex items-center gap-2"><i class="bi bi-diagram-3-fill text-accent-bright"></i> Extracted Matching Pools</h5>
            </div>

            <div class="p-0">
                <div th:if="${activeJobs.isEmpty()}" class="py-24 text-center bg-white/[0.02]">
                    <i class="bi bi-diagram-2 text-5xl text-foreground-subtle mb-4 block"></i>
                    <h6 class="font-bold text-foreground-subtle mb-6">No Node Instances Active</h6>
                    <a href="/jobs/create" class="modern-btn modern-btn-primary shadow-modern-button">
                        <i class="bi bi-plus-circle mr-2"></i> Initialize Protocol
                    </a>
                </div>

                <div th:unless="${activeJobs.isEmpty()}" class="overflow-x-auto bg-transparent">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-white/[0.02] text-[10px] font-black uppercase tracking-widest text-foreground-subtle border-b border-white/[0.08]">
                            <tr>
                                <th class="py-4 px-6">Node Identifier</th>
                                <th class="py-4 px-6 text-center">Volume</th>
                                <th class="py-4 px-6 text-center">Mean Score</th>
                                <th class="py-4 px-6 text-center">Max Range</th>
                                <th class="py-4 px-6 text-center">High Signal</th>
                                <th class="py-4 px-6 text-center">Med Signal</th>
                                <th class="py-4 px-6 text-right pr-6">Commands</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/[0.04] font-medium text-sm">
                            <tr th:each="job : ${activeJobs}" class="hover:bg-white/[0.04] transition-colors group relative">
                                
                                <td class="py-4 px-6">
                                    <div class="flex flex-col hover:cursor-pointer" th:onclick="'window.location.href=\'/skill-match/job/' + ${job.id} + '\''">
                                        <strong class="text-foreground group-hover:text-accent-bright transition-colors text-base" th:text="${job.title}">Software Engineer</strong>
                                        <span class="text-xs text-foreground-subtle font-bold mt-1" th:text="${job.department}">Engineering</span>
                                    </div>
                                </td>
                                
                                <td class="py-4 px-6 text-center">
                                    <span class="font-mono text-foreground-muted font-black" th:text="${jobStats[job.id].totalMatches}">0</span>
                                </td>
                                
                                <td class="py-4 px-6 text-center">
                                    <div class="inline-flex px-3 py-1 rounded-[10px] bg-surface text-foreground-muted border border-white/[0.08] shadow-inner font-black">
                                        <span th:text="${#numbers.formatDecimal(jobStats[job.id].averageScore, 1, 1)}">0.0</span><span class="text-[9px] ml-0.5">%</span>
                                    </div>
                                </td>
                                
                                <td class="py-4 px-6 text-center">
                                    <div class="inline-flex px-3 py-1 rounded-[10px] bg-accent/10 text-accent border border-accent/20 shadow-inner font-black">
                                        <span th:text="${#numbers.formatDecimal(jobStats[job.id].maxScore, 1, 1)}">0.0</span><span class="text-[9px] ml-0.5">%</span>
                                    </div>
                                </td>

                                <td class="py-4 px-6 text-center">
                                    <span class="px-3 py-1 bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 font-black rounded-lg text-xs tracking-widest" th:text="${jobStats[job.id].excellentMatches}">0</span>
                                </td>
                                
                                <td class="py-4 px-6 text-center">
                                    <span class="px-3 py-1 bg-amber-500/20 border border-amber-500/30 text-amber-400 font-black rounded-lg text-xs tracking-widest" th:text="${jobStats[job.id].goodMatches}">0</span>
                                </td>

                                <td class="py-4 px-6 text-right pr-6">
                                    <div class="flex justify-end gap-2">
                                        <a th:href="@{/skill-match/job/{id}(id=${job.id})}" class="modern-btn modern-btn-secondary h-10 px-4 text-xs font-black uppercase tracking-widest">
                                            <i class="bi bi-eye mr-2 text-sm"></i> Inspect
                                        </a>
                                        <a th:href="@{/ranking/job/{id}(id=${job.id})}" class="modern-btn bg-surface border border-white/[0.08] text-foreground-muted hover:text-accent hover:border-accent/50 h-10 px-4 text-xs font-black uppercase tracking-widest shadow-sm">
                                            <i class="bi bi-sort-numeric-down mr-2 text-sm"></i> Rankings
                                        </a>
                                    </div>
                                </td>
                                
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </main>

</body>
</html>
