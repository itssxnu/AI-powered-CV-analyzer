<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Applications - ' + ${job.title}">Job Applications</title>
    <div th:replace="~{fragments/modern-setup :: tailwind-config}"></div>
</head>
<body class="bg-background-base text-foreground font-sans min-h-screen relative overflow-x-hidden p-0 m-0 pb-20">

    
    <!-- Ambient Blobs Background -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden -z-10">
        <div class="ambient-noise"></div>
        <div class="absolute w-[900px] h-[1400px] rounded-[100%] blur-[150px] bg-accent/15 top-[10%] left-[-10%] animate-blob-float mix-blend-screen"></div>
        <div class="absolute w-[800px] h-[800px] rounded-[100%] blur-[150px] bg-indigo-600/10 bottom-[-20%] right-[10%] animate-blob-float-alt mix-blend-screen"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCI+PHBhdGggZD0iTTY0IDBMMCAwaDB2NjRoNjRWMHptLTYzIDYzaC0xdjYzaDF2LTYzeiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwgMjU1LCAyNTUsIDAuMDIpIiBzdHJva2Utd2lkdGg9IjEiLz48L3N2Zz4=')] opacity-50"></div>
    </div>


    <div th:replace="~{fragments/header :: header}"></div>

    <main class="max-w-[1400px] mx-auto px-4 sm:px-8 py-10 lg:py-16 relative z-10 space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-4">
            <div class="flex items-start gap-4">
                <a href="/applications/dashboard" class="mt-1 w-12 h-12 rounded-full bg-surface border border-white/[0.08] text-foreground-muted flex items-center justify-center hover:text-accent-bright hover:bg-white/[0.04] hover:-translate-y-1 active:scale-95 transition-all flex-shrink-0 shadow-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-black font-heading tracking-tight mb-2 flex items-center gap-3">
                        <i class="bi bi-people-fill text-accent-bright"></i> Job Applications
                    </h1>
                    <p class="text-foreground-muted font-bold tracking-wide uppercase text-sm">
                        Job: <span class="text-accent truncate max-w-[200px] inline-block align-bottom" th:text="${job.title}"></span>
                        <span class="mx-2 text-foreground-subtle/30">|</span>
                        <i class="bi bi-geo-alt-fill text-foreground-subtle"></i> <span th:text="${job.location}"></span>
                        <span class="mx-2 text-foreground-subtle/30">|</span>
                        <i class="bi bi-building-fill text-foreground-subtle"></i> <span th:text="${job.department}"></span>
                    </p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-3">
                <a th:href="@{/applications/job/{id}/shortlisted(id=${job.id})}" class="modern-btn modern-btn-primary shadow-sky-500/30 font-black">
                    <i class="bi bi-star-fill mr-2 text-amber-300"></i> Shortlisted
                </a>
                <button onclick="exportApplications()" class="modern-btn modern-btn-secondary border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/10">
                    <i class="bi bi-download mr-2"></i> Export
                </button>
                <button onclick="removeRejected()" class="modern-btn border border-rose-500/40 text-rose-400 hover:bg-rose-500/10 font-black">
                    <i class="bi bi-trash3-fill mr-2"></i> Delete Rejected
                </button>
            </div>
        </div>

        <!-- Metric Cards -->
        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 lg:gap-4 mb-4">
            
            <div class="modern-card p-4 flex flex-col items-center justify-center bg-surface border border-white/[0.08] hover:-translate-y-1 transition-transform">
                <span class="text-xl md:text-2xl font-black text-foreground" th:text="${stats['totalApplications'] != null ? stats['totalApplications'] : stats['total']}">0</span>
                <span class="text-[9px] font-bold uppercase tracking-widest text-foreground-subtle mt-1 text-center">Total Applicants</span>
            </div>
            
            <div class="modern-card p-4 flex flex-col items-center justify-center border-b-4 border-b-amber-500 bg-surface border-t border-x border-white/[0.08] hover:-translate-y-1 transition-transform">
                <span class="text-xl md:text-2xl font-black text-foreground" th:text="${stats['statusCounts'] != null ? stats['statusCounts']['PENDING'] : (stats['pending'] != null ? stats['pending'] : 0)}">0</span>
                <span class="text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded bg-amber-500/10 text-amber-500 border border-amber-500/20 mt-1 text-center">Pending</span>
            </div>
            
            <div class="modern-card p-4 flex flex-col items-center justify-center border-b-4 border-b-sky-500 bg-surface border-t border-x border-white/[0.08] hover:-translate-y-1 transition-transform">
                <span class="text-xl md:text-2xl font-black text-foreground" th:text="${stats['statusCounts'] != null ? stats['statusCounts']['SHORTLISTED'] : (stats['shortlisted'] != null ? stats['shortlisted'] : 0)}">0</span>
                <span class="text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded bg-sky-500/10 text-sky-400 border border-sky-500/20 mt-1 text-center">Shortlisted</span>
            </div>
            
            <div class="modern-card p-4 flex flex-col items-center justify-center border-b-4 border-b-accent bg-surface border-t border-x border-white/[0.08] hover:-translate-y-1 transition-transform">
                <span class="text-xl md:text-2xl font-black text-foreground" th:text="${stats['statusCounts'] != null ? stats['statusCounts']['INTERVIEW_SCHEDULED'] : (stats['interview'] != null ? stats['interview'] : 0)}">0</span>
                <span class="text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded bg-accent/10 text-accent-bright border border-accent/20 mt-1 text-center">Interviewing</span>
            </div>
            
            <div class="modern-card p-4 flex flex-col items-center justify-center border-b-4 border-b-emerald-500 bg-surface border-t border-x border-white/[0.08] hover:-translate-y-1 transition-transform">
                <span class="text-xl md:text-2xl font-black text-foreground" th:text="${stats['statusCounts'] != null ? stats['statusCounts']['HIRED'] : (stats['hired'] != null ? stats['hired'] : 0)}">0</span>
                <span class="text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 mt-1 text-center">Hired</span>
            </div>

            <div class="modern-card p-4 flex flex-col items-center justify-center bg-surface border border-white/[0.08] text-white hover:-translate-y-1 transition-transform relative overflow-hidden group">
                <i class="bi bi-cpu absolute -right-2 -bottom-2 text-4xl text-sky-500 opacity-10 group-hover:opacity-30 transition-opacity"></i>
                <span class="text-xl md:text-2xl font-black text-sky-400" th:text="${#numbers.formatDecimal(stats['averageMatchScore'] != null ? stats['averageMatchScore'] : (stats['avgMatchScore'] != null ? stats['avgMatchScore'] : 0), 1, 1)}">0.0</span>
                <span class="text-[9px] font-bold uppercase tracking-widest text-sky-500 mt-1 text-center">AVG Score</span>
            </div>
            
        </div>

        <!-- Filter Deck -->
        <form method="get" class="modern-card p-4 sm:p-6 bg-surface border border-white/[0.08] shadow-sm flex flex-wrap lg:flex-nowrap gap-4 items-end" id="filterForm">
            
            <div class="w-full lg:w-48">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-foreground-subtle mb-2 ml-1">Status Filter</label>
                <div class="relative">
                    <select name="status" class="modern-input bg-background-base text-foreground border-white/[0.08] pl-10 text-sm w-full appearance-none" onchange="this.form.submit()">
                        <option value="">All Statuses</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s.name()}"
                                th:text="${s.displayName}"
                                th:selected="${currentStatus != null and currentStatus.name() == s.name()}">
                        </option>
                    </select>
                    <i class="bi bi-funnel absolute left-4 top-1/2 -translate-y-1/2 text-foreground-subtle"></i>
                </div>
            </div>

            <div class="w-full lg:flex-1">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-foreground-subtle mb-2 ml-1">Search Candidates</label>
                <div class="relative">
                    <input type="text" name="search" th:value="${search}" placeholder="Search by name or email..." class="modern-input bg-background-base text-foreground border-white/[0.08] pl-10 pr-12 text-sm w-full placeholder-foreground-subtle/50">
                    <i class="bi bi-search absolute left-4 top-1/2 -translate-y-1/2 text-foreground-subtle"></i>
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg bg-accent text-white flex items-center justify-center hover:bg-accent-bright transition-colors shadow-sm">
                        <i class="bi bi-arrow-right-short text-xl"></i>
                    </button>
                </div>
            </div>
            
            <div class="w-full sm:w-1/2 lg:w-32">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-foreground-subtle mb-2 ml-1">Min Score</label>
                <select name="minScore" class="modern-input bg-background-base text-foreground border-white/[0.08] text-sm w-full appearance-none px-4" onchange="this.form.submit()">
                    <option value="">Any</option>
                    <option value="80">80%+</option>
                    <option value="60">60%+</option>
                    <option value="40">40%+</option>
                </select>
            </div>

            <div class="w-full sm:w-1/2 lg:w-48">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-foreground-subtle mb-2 ml-1">Sort By</label>
                <div class="relative">
                    <select name="sortBy" class="modern-input bg-background-base text-foreground border-white/[0.08] pl-10 text-sm w-full appearance-none" onchange="this.form.submit()">
                        <option value="appliedDate">Date Applied</option>
                        <option value="matchScore">Match Score</option>
                        <option value="candidateName">Candidate Name</option>
                    </select>
                    <i class="bi bi-sort-down absolute left-4 top-1/2 -translate-y-1/2 text-foreground-subtle"></i>
                </div>
            </div>

            <div class="w-full lg:w-auto shrink-0 flex items-center gap-2">
                <a th:href="@{/applications/job/{id}(id=${job.id})}" class="h-[46px] px-6 rounded-[14px] bg-background-base border border-white/[0.08] text-foreground-muted font-bold hover:bg-white/[0.06] hover:text-foreground transition-colors flex items-center shadow-sm w-full justify-center">
                    <i class="bi bi-arrow-clockwise mr-2"></i> Reset
                </a>
            </div>
            
        </form>

        <!-- Batch Controller -->
        <div class="modern-card p-4 sm:p-6 bg-surface border border-white/[0.08] text-white flex flex-col md:flex-row items-center gap-4 relative overflow-hidden group shadow-sm">
            <i class="bi bi-diagram-2 absolute -left-10 -bottom-10 text-9xl text-white opacity-5 pointer-events-none"></i>
            
            <label class="flex items-center gap-3 cursor-pointer shrink-0 z-10">
                <div class="relative w-6 h-6">
                    <input type="checkbox" id="selectAll" onclick="toggleAll()" class="peer sr-only">
                    <div class="w-full h-full border-2 border-white/[0.1] rounded bg-white/[0.04] peer-checked:bg-accent peer-checked:border-accent transition-all flex items-center justify-center">
                        <i class="bi bi-check-lg text-white opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-all font-black"></i>
                    </div>
                </div>
                <span class="font-bold tracking-widest uppercase text-xs text-foreground-muted">Select All</span>
                <span class="w-6 h-6 rounded bg-accent/20 border border-accent/30 text-accent-bright flex items-center justify-center font-mono text-[10px]" id="selectedCount">0</span>
            </label>

            <div class="w-px h-8 bg-white/[0.08] hidden md:block z-10 mx-2"></div>

            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 scrollbar-hide z-10">
                <div class="flex items-center bg-white/[0.02] p-1.5 rounded-[16px] border border-white/[0.08] shrink-0 shadow-inner">
                    <select id="bulkStatus" class="bg-transparent border-0 text-foreground-muted text-xs font-bold uppercase tracking-widest focus:ring-0 mr-2 appearance-none cursor-pointer p-0 w-[120px] ml-2">
                        <option value="" class="text-foreground">Change Status</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s.name()}"
                                th:text="${s.displayName}" class="text-background-base font-medium">
                        </option>
                    </select>
                    <button onclick="bulkUpdate()" class="px-4 py-2 rounded-xl bg-white/[0.04] border border-white/[0.08] hover:bg-white/[0.1] hover:text-foreground text-foreground-muted transition-all text-xs font-black uppercase tracking-widest shadow-sm">
                        Confirm
                    </button>
                </div>

                <button onclick="bulkShortlist()" class="px-6 h-[44px] rounded-[16px] bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 hover:text-sky-300 border border-sky-500/30 transition-all text-xs font-black uppercase tracking-widest shrink-0 flex items-center shadow-sm">
                    <i class="bi bi-star-fill mr-2"></i> Shortlist
                </button>
                <button onclick="bulkSchedule()" class="px-6 h-[44px] rounded-[16px] bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 hover:text-indigo-300 border border-indigo-500/30 transition-all text-xs font-black uppercase tracking-widest shrink-0 flex items-center shadow-sm">
                    <i class="bi bi-calendar-check-fill mr-2"></i> Interview
                </button>
                <button onclick="bulkReject()" class="px-6 h-[44px] rounded-[16px] bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 hover:text-rose-300 border border-rose-500/30 transition-all text-xs font-black uppercase tracking-widest shrink-0 flex items-center shadow-sm">
                    <i class="bi bi-x-octagon-fill mr-2"></i> Reject
                </button>
                <button onclick="batchMatch()" class="px-6 h-[44px] rounded-[16px] bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 hover:text-emerald-300 border border-emerald-500/30 transition-all text-xs font-black uppercase tracking-widest shrink-0 flex items-center shadow-sm">
                    <i class="bi bi-cpu-fill mr-2"></i> Calculate Score
                </button>
            </div>

        </div>

        <!-- Data Grid -->
        <div class="modern-card p-0 overflow-hidden border border-white/[0.08] bg-transparent shadow-sm">
            <div class="p-6 bg-white/[0.02] border-b border-white/[0.08] flex justify-between items-center backdrop-blur-sm">
                <h5 class="font-black text-foreground flex items-center gap-2"><i class="bi bi-hdd-stack-fill text-accent-bright"></i> Applicant List</h5>
                <span class="text-[10px] font-bold uppercase tracking-widest px-3 py-1 bg-surface text-foreground-subtle border border-white/[0.08] shadow-sm rounded-lg" th:text="${applications.size()} + ' records'">0 records</span>
            </div>
            
            <div class="p-0">
                <div th:if="${applications.isEmpty()}" class="py-24 text-center">
                    <div class="w-24 h-24 rounded-3xl bg-surface border border-white/[0.08] text-foreground-muted flex items-center justify-center text-5xl mx-auto shadow-inner mb-6">
                        <i class="bi bi-funnel text-foreground-subtle"></i>
                    </div>
                    <h3 class="text-2xl font-black mb-2 text-foreground">No Results Found</h3>
                    <p class="text-foreground-muted font-medium max-w-sm mx-auto">No applicants match your current filters. Try adjusting your search criteria.</p>
                </div>

                <div th:unless="${applications.isEmpty()}" class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <tbody class="divide-y divide-white/[0.04] font-medium text-sm">
                            <tr th:each="app : ${applications}" class="hover:bg-white/[0.04] bg-white/[0.02] transition-colors group relative border-l-4 border-b border-b-white/[0.04]" th:classappend="${app.status.name() == 'PENDING' ? 'border-l-amber-500' : (app.status.name() == 'SHORTLISTED' ? 'border-l-sky-500' : (app.status.name() == 'INTERVIEW_SCHEDULED' ? 'border-l-accent' : (app.status.name() == 'REJECTED' ? 'border-l-rose-500' : 'border-l-emerald-500')))}">
                                
                                <td class="py-4 px-4 w-12 pl-6">
                                    <label class="cursor-pointer">
                                        <div class="relative w-5 h-5">
                                            <input type="checkbox" class="application-checkbox peer sr-only" th:value="${app.id}" th:data-candidate="${app.candidate.fullName}">
                                            <div class="w-full h-full border-2 border-white/[0.1] rounded bg-background-base peer-checked:bg-accent peer-checked:border-accent transition-all flex items-center justify-center shadow-inner">
                                                <i class="bi bi-check-lg text-white opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-all text-xs font-black"></i>
                                            </div>
                                        </div>
                                    </label>
                                </td>

                                <td class="py-4 px-6 w-24">
                                    <div class="flex flex-col items-center">
                                        <div class="flex items-center justify-center w-12 h-12 rounded-2xl shadow-sm border text-base font-black relative overflow-hidden bg-surface"
                                            th:classappend="${app.matchScore != null ? (app.matchScore >= 80 ? 'border-emerald-500/20 text-emerald-400' : (app.matchScore >= 60 ? 'border-amber-500/20 text-amber-500' : 'border-rose-500/20 text-rose-500')) : 'border-white/[0.08] text-foreground-subtle'}">
                                            
                                            <span class="relative z-10 flex items-center"><span th:if="${app.matchScore != null}" th:text="${#numbers.formatDecimal(app.matchScore, 0, 0)}">85</span><span th:unless="${app.matchScore != null}">--</span><span class="text-[9px] ml-0.5" th:if="${app.matchScore != null}">%</span></span>
                                        </div>
                                    </div>
                                </td>

                                <td class="py-4 px-6">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 rounded-[16px] bg-gradient-to-br from-indigo-500/20 to-sky-500/20 border border-white/[0.08] text-accent-bright flex items-center justify-center font-black shadow-inner hidden sm:flex">
                                            <span th:text="${#strings.substring(app.candidate.firstName, 0, 1)} + ${#strings.substring(app.candidate.lastName, 0, 1)}">JD</span>
                                        </div>
                                        <div class="flex flex-col">
                                            <span class="font-bold text-lg text-foreground group-hover:text-accent-bright transition-colors" th:text="${app.candidate.fullName}">John Doe</span>
                                            <span class="text-xs text-foreground-subtle font-medium flex items-center gap-1.5"><i class="bi bi-envelope"></i> <span th:text="${app.candidate.email}"></span></span>
                                        </div>
                                    </div>
                                </td>

                                <td class="py-4 px-6">
                                    <div class="flex flex-col items-start gap-1 justify-center">
                                        <span class="font-mono text-xs text-foreground-subtle font-bold tracking-tight"><i class="bi bi-clock mr-1 text-foreground-subtle/50"></i> <span th:text="${#temporals.format(app.appliedDate, 'dd MMM HH:mm')}"></span></span>
                                        <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-lg border shadow-sm"
                                            th:classappend="${app.status.name() == 'PENDING' ? 'bg-amber-500/10 text-amber-500 border-amber-500/20' : (app.status.name() == 'SHORTLISTED' ? 'bg-sky-500/10 text-sky-400 border-sky-500/20' : (app.status.name() == 'INTERVIEW_SCHEDULED' ? 'bg-accent/10 text-accent-bright border-accent/20' : (app.status.name() == 'REJECTED' ? 'bg-rose-500/10 text-rose-500 border-rose-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20')))}"
                                            th:text="${app.status.displayName}">Pending</span>
                                    </div>
                                </td>

                                <td class="py-4 px-6 text-center">
                                    <div th:if="${app.interviewScheduled}" class="inline-flex flex-col items-center">
                                        <span class="w-8 h-8 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 flex items-center justify-center shadow-sm relative group/tt">
                                            <i class="bi bi-calendar-check-fill text-sm"></i>
                                            <!-- Tooltip -->
                                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-max px-3 py-1.5 bg-surface border border-white/[0.08] text-foreground text-[10px] font-bold rounded-lg opacity-0 invisible group-hover/tt:opacity-100 group-hover/tt:visible transition-all shadow-xl z-50 pointer-events-none">
                                                <span th:text="${#temporals.format(app.interviewDate, 'dd MMM HH:mm')}"></span>
                                            </div>
                                        </span>
                                        <span class="text-[9px] font-bold uppercase tracking-widest text-emerald-500 mt-1" th:text="${app.interviewType}">ONLINE</span>
                                    </div>
                                    <div th:unless="${app.interviewScheduled}" class="text-white/[0.04]">
                                        <i class="bi bi-dash text-2xl drop-shadow-sm"></i>
                                    </div>
                                </td>

                                <td class="py-4 px-6 text-right pr-6">
                                    <div class="inline-flex bg-surface p-1.5 rounded-[20px] shadow-sm border border-white/[0.08] gap-1 opacity-60 group-hover:opacity-100 transition-opacity">
                                        <a th:href="@{/applications/{id}/schedule-interview(id=${app.id})}" class="w-10 h-10 flex items-center justify-center rounded-xl bg-background-base border border-white/[0.08] text-emerald-500 hover:bg-emerald-500/20 hover:text-emerald-400 hover:border-emerald-500/30 transition-all text-lg" title="Schedule Interview">
                                            <i class="bi bi-calendar-plus-fill"></i>
                                        </a>
                                        <a th:href="@{/hr/candidates/{id}(id=${app.candidate.id})}" class="w-10 h-10 flex items-center justify-center rounded-xl bg-background-base border border-white/[0.08] text-sky-500 hover:bg-sky-500/20 hover:text-sky-400 hover:border-sky-500/30 transition-all text-lg" title="Candidate Profile">
                                            <i class="bi bi-person-fill"></i>
                                        </a>
                                        <div class="w-px h-6 bg-white/[0.08] mx-1 my-auto"></div>
                                        <form th:action="@{/hr/applications/{id}/recalculate(id=${app.id})}" method="post" class="inline">
                                            <button type="submit" class="p-1.5 rounded-lg text-emerald-400 hover:bg-emerald-500/10 hover:text-emerald-300 transition-colors" title="Recalculate Match">
                                                <i class="bi bi-arrow-repeat text-sm"></i>
                                            </button>
                                        </form>
                                        <button type="button" class="w-10 h-10 flex items-center justify-center rounded-xl bg-background-base border border-white/[0.08] text-amber-500 hover:bg-amber-500/20 hover:text-amber-400 hover:border-amber-500/30 transition-all text-lg" th:onclick="'quickStatusChange(' + ${app.id} + ')'" title="Update Status">
                                            <i class="bi bi-pencil-fill text-sm"></i>
                                        </button>
                                    </div>
                                </td>
                                
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
            
            <!-- Pagination -->
            <div class="p-4 bg-white/[0.02] border-t border-white/[0.08] flex justify-center" th:if="${totalPages > 1}">
                <div class="inline-flex bg-surface border border-white/[0.08] rounded-2xl p-1.5 shadow-sm">
                    <a th:classappend="${currentPage == 1} ? 'opacity-50 pointer-events-none'" 
                       class="w-10 h-10 rounded-xl flex items-center justify-center text-foreground-subtle hover:bg-white/[0.06] hover:text-foreground transition-all" 
                       th:href="@{/applications/job/{id}(id=${job.id}, page=${currentPage - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    
                    <a th:each="i : ${#numbers.sequence(1, totalPages)}"
                       class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm transition-all"
                       th:classappend="${i == currentPage} ? 'bg-accent text-white shadow-md cursor-default border border-accent/50' : 'text-foreground-muted hover:bg-white/[0.06] hover:text-foreground'"
                       th:href="${i == currentPage} ? 'javascript:void(0)' : @{/applications/job/{id}(id=${job.id}, page=${i})}" th:text="${i}">1</a>
                       
                    <a th:classappend="${currentPage == totalPages} ? 'opacity-50 pointer-events-none'" 
                       class="w-10 h-10 rounded-xl flex items-center justify-center text-foreground-subtle hover:bg-white/[0.06] hover:text-foreground transition-all" 
                       th:href="@{/applications/job/{id}(id=${job.id}, page=${currentPage + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>

        </div>

    </main>

    <script th:inline="javascript">
        /*<![CDATA[*/
        function toggleAll() {
            const selectAll = document.getElementById('selectAll').checked;
            document.querySelectorAll('.application-checkbox').forEach(cb => { cb.checked = selectAll; });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = document.querySelectorAll('.application-checkbox:checked').length;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.application-checkbox').forEach(cb => {
                cb.addEventListener('change', updateSelectedCount);
            });
        });

        function getSelectedIds() {
            return Array.from(document.querySelectorAll('.application-checkbox:checked')).map(cb => cb.value);
        }

        function bulkUpdate() {
            const ids = getSelectedIds();
            const status = document.getElementById('bulkStatus').value;
            if (!ids.length) { alert('Please select at least one candidate.'); return; }
            if (!status) { alert('Please select a status.'); return; }

            const notes = prompt('Add system notes (optional):', '');
            submitBulkForm('/applications/bulk-status-update', ids, { status: status, notes: notes || '', jobId: [[${job.id}]] }, 'applicationIds');
        }

        function bulkShortlist() {
            const ids = getSelectedIds();
            if (!ids.length) { alert('Please select at least one candidate.'); return; }
            const notes = prompt('Add targeting notes (optional):', '');
            submitBulkForm('/applications/job/' + [[${job.id}]] + '/shortlist', ids, { notes: notes || '' }, 'candidateIds');
        }

        function bulkSchedule() {
            const ids = getSelectedIds();
            if (!ids.length) { alert('Please select at least one candidate.'); return; }
            window.location.href = '/applications/batch-schedule?ids=' + ids.join(',');
        }

        function bulkReject() {
            const ids = getSelectedIds();
            if (!ids.length) { alert('Please select at least one candidate.'); return; }
            if (!confirm('Are you sure you want to reject ' + ids.length + ' candidates?')) return;
            const feedback = prompt('Provide rejection reasoning (optional):', '');
            submitBulkForm('/applications/bulk-status-update', ids, { status: 'REJECTED', notes: feedback || '', jobId: [[${job.id}]] }, 'applicationIds');
        }

        function batchMatch() {
            const ids = getSelectedIds();
            if (!ids.length) { alert('Please select at least one candidate to score.'); return; }
            if (!confirm('Calculate AI match scores for ' + ids.length + ' candidates?')) return;
            submitBulkForm('/hr/applications/batch-match', ids, { jobId: [[${job.id}]] }, 'applicationIds');
        }

        function quickStatusChange(applicationId) {
            const valid = ['PENDING', 'SHORTLISTED', 'INTERVIEW_SCHEDULED', 'REJECTED', 'HIRED'];
            const status = prompt('Select New Status (' + valid.join('/') + '):', '');
            if (status && valid.includes(status)) {
                const notes = prompt('Override notes (optional):', '');
                submitSingleForm('/applications/' + applicationId + '/status', { status: status, notes: notes || '', notify: 'true' });
            } else if (status) {
                alert("Invalid status selected.");
            }
        }

        function removeRejected() {
            if (confirm('Are you sure you want to delete all rejected applications?')) {
                submitSingleForm('/applications/job/' + [[${job.id}]] + '/remove-rejected', {});
            }
        }

        function exportApplications() {
            const status = document.querySelector('select[name="status"]')?.value || '';
            const search = document.querySelector('input[name="search"]')?.value || '';
            window.location.href = '/applications/job/' + [[${job.id}]] + '/export?status=' + status + '&search=' + encodeURIComponent(search);
        }

        // Helpers
        function submitBulkForm(actionUrl, ids, extraParams, idParamName) {
            const form = document.createElement('form');
            form.method = 'POST'; form.action = actionUrl;
            
            ids.forEach(id => addHiddenInput(form, idParamName, id));

            for(const [k, v] of Object.entries(extraParams)) {
                addHiddenInput(form, k, v);
            }
            addCSRF(form);
            document.body.appendChild(form); form.submit();
        }

        function submitSingleForm(actionUrl, params) {
            const form = document.createElement('form');
            form.method = 'POST'; form.action = actionUrl;
            for(const [k, v] of Object.entries(params)) addHiddenInput(form, k, v);
            addCSRF(form);
            document.body.appendChild(form); form.submit();
        }

        function addHiddenInput(form, name, value) {
            const i = document.createElement('input'); i.type = 'hidden'; i.name = name; i.value = value; form.appendChild(i);
        }

        function addCSRF(form) {
            const t = document.querySelector('meta[name="_csrf"]')?.content;
            if (t) addHiddenInput(form, '_csrf', t);
        }
        /*]]>*/
    </script>
</body>
</html>
